<style>:root{--bg:#0B0F15;--surface:#131822;--surface2:#1A2029;--ink:#E7EBF1;--muted:#8D97A5;--line:#222937;--accent:#F0A83E;--accent-soft:#291F10;--accent-line:#4A3A1E;--good:#4CB98A;--good-soft:#132720;--warn:#E0A83E;--bad:#E06666;--bad-soft:#2C1A1A;--info:#5BAEF0;--info-soft:#132436;--sel:#1D2330;--tg:#2AABEE;--mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;--ui:"Helvetica Neue",-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
*{box-sizing:border-box}body{margin:0;padding:24px;background:var(--bg);color:var(--ink);font:14px/1.5 var(--ui);-webkit-font-smoothing:antialiased}
.lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 10px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:640px}
.sw{border:1px solid var(--line);border-radius:10px;overflow:hidden}
.sw .c{height:52px}.sw .t{padding:7px 10px;background:var(--surface)}
.sw .t b{display:block;font-size:11.5px}.sw .t span{font-family:var(--mono);font-size:10px;color:var(--muted)}
</style>
<p class="lbl">WIRE · Палитра (dark — основная)</p>
<div class="grid">
<div class="sw"><div class="c" style="background:#0B0F15"></div><div class="t"><b>bg</b><span>#0B0F15</span></div></div>
<div class="sw"><div class="c" style="background:#131822"></div><div class="t"><b>surface</b><span>#131822</span></div></div>
<div class="sw"><div class="c" style="background:#E7EBF1"></div><div class="t"><b>ink</b><span>#E7EBF1</span></div></div>
<div class="sw"><div class="c" style="background:#8D97A5"></div><div class="t"><b>muted</b><span>#8D97A5</span></div></div>
<div class="sw"><div class="c" style="background:#F0A83E"></div><div class="t"><b>accent · янтарь</b><span>#F0A83E</span></div></div>
<div class="sw"><div class="c" style="background:#4CB98A"></div><div class="t"><b>good</b><span>#4CB98A</span></div></div>
<div class="sw"><div class="c" style="background:#E06666"></div><div class="t"><b>bad</b><span>#E06666</span></div></div>
<div class="sw"><div class="c" style="background:#5BAEF0"></div><div class="t"><b>info</b><span>#5BAEF0</span></div></div>
</div>
<p class="lbl" style="margin-top:18px">Правило: акцент — один (янтарь). Семантика ≠ акцент. Telegram-синий #2AABEE — только внутри TG-контекстов.</p>

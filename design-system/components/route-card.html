<!-- @dsCard group="Компоненты" -->
<style>:root{--bg:#0B0F15;--surface:#131822;--surface2:#1A2029;--ink:#E7EBF1;--muted:#8D97A5;--line:#222937;--accent:#F0A83E;--accent-soft:#291F10;--accent-line:#4A3A1E;--good:#4CB98A;--good-soft:#132720;--warn:#E0A83E;--bad:#E06666;--bad-soft:#2C1A1A;--info:#5BAEF0;--info-soft:#132436;--sel:#1D2330;--tg:#2AABEE;--mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;--ui:"Helvetica Neue",-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
*{box-sizing:border-box}body{margin:0;padding:24px;background:var(--bg);color:var(--ink);font:14px/1.5 var(--ui);-webkit-font-smoothing:antialiased}
.lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 10px}
.rc{max-width:360px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.rc.paused{opacity:.55}
.d{display:flex;align-items:center;gap:8px;font-weight:650;font-size:14px;margin-bottom:9px}
.ic{width:30px;height:30px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center}
.chip{font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;padding:2px 7px;border-radius:5px;margin-right:4px}
.pill{font-family:var(--mono);font-size:10px;border:1px solid var(--line);color:var(--muted);border-radius:99px;padding:2px 9px}
.ft{display:flex;font-size:11.5px;color:var(--muted);font-family:var(--mono);border-top:1px solid var(--line);padding-top:10px;margin-top:10px}
.ft .st{color:var(--good)}.ft .n{margin-left:auto}
.msw{margin-left:auto}.sw{width:30px;height:17px;border-radius:99px;background:var(--accent);position:relative;display:inline-block}
.sw::after{content:"";position:absolute;width:13px;height:13px;border-radius:50%;background:var(--surface);top:2px;right:2px}
</style>
<p class="lbl">Маршрут доставки</p>
<div class="rc">
<div class="d"><span class="ic">📣</span>Crypto Signals Chat<span class="pill">группа</span><span class="msw"><span class="sw"></span></span></div>
<div><span class="chip" style="color:#EFC152;background:#2A2410">Крипта</span><span class="chip" style="color:#63C795;background:#152B22">Финансы</span><span class="pill">карточка</span></div>
<div style="font-size:12px;color:var(--muted);margin-top:8px">без рекламы · дубли склеены · важн ≥3</div>
<div class="ft"><span class="st">● активен</span><span class="n">сегодня: 47 доставлено</span></div>
</div>

<!-- @dsCard group="Лента" -->
<style>:root{--bg:#0B0F15;--surface:#131822;--surface2:#1A2029;--ink:#E7EBF1;--muted:#8D97A5;--line:#222937;--accent:#F0A83E;--accent-soft:#291F10;--accent-line:#4A3A1E;--good:#4CB98A;--good-soft:#132720;--warn:#E0A83E;--bad:#E06666;--bad-soft:#2C1A1A;--info:#5BAEF0;--info-soft:#132436;--sel:#1D2330;--tg:#2AABEE;--mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;--ui:"Helvetica Neue",-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
*{box-sizing:border-box}body{margin:0;padding:24px;background:var(--bg);color:var(--ink);font:14px/1.5 var(--ui);-webkit-font-smoothing:antialiased}
.lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 10px}
.blk{max-width:520px;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.hd{display:flex;gap:8px;padding:9px 13px;background:var(--surface2);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700}
.hd .n{color:var(--info)}
.ln{display:flex;align-items:center;gap:10px;padding:7px 13px;border-top:1px solid var(--line);font-size:12.5px;background:var(--surface)}
.ln .ch{font-weight:600}.ln .u{color:var(--info);font-family:var(--mono);font-size:11px}
.first{font-family:var(--mono);font-size:9.5px;color:var(--good);border:1px solid var(--good);border-radius:99px;padding:1px 7px;letter-spacing:.06em}
.lag{font-family:var(--mono);font-size:10px;color:var(--muted);opacity:.7}
.dt{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
</style>
<p class="lbl">Хронология источников события — кто первый, кто с каким лагом</p>
<div class="blk">
<div class="hd">⧉ <span class="n">14</span> источников · хронология</div>
<div class="ln"><span class="ch">Binance Announcements</span><span class="u">@binance_announcements</span><span class="first">ПЕРВЫЙ</span><span class="dt">43 сек назад</span></div>
<div class="ln"><span class="ch">Crypto Insider</span><span class="u">@crypto_insider</span><span class="lag">+17 мин</span><span class="dt">1 мин назад</span></div>
<div class="ln"><span class="ch">Раньше всех. Ну почти.</span><span class="u">@bbbreaking</span><span class="lag">+14 мин</span><span class="dt">4 мин назад</span></div>
<div class="ln" style="color:var(--info);font-size:12px">Показать все 14 →</div>
</div>

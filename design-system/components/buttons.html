<!-- @dsCard group="Компоненты" -->
<style>:root{--bg:#0B0F15;--surface:#131822;--surface2:#1A2029;--ink:#E7EBF1;--muted:#8D97A5;--line:#222937;--accent:#F0A83E;--accent-soft:#291F10;--accent-line:#4A3A1E;--good:#4CB98A;--good-soft:#132720;--warn:#E0A83E;--bad:#E06666;--bad-soft:#2C1A1A;--info:#5BAEF0;--info-soft:#132436;--sel:#1D2330;--tg:#2AABEE;--mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;--ui:"Helvetica Neue",-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
*{box-sizing:border-box}body{margin:0;padding:24px;background:var(--bg);color:var(--ink);font:14px/1.5 var(--ui);-webkit-font-smoothing:antialiased}
.lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 10px}
.r{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.b{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--ink);background:none;cursor:pointer}
.b.pri{background:var(--accent);border-color:var(--accent);color:#14100A}
.b.tg{background:var(--tg);border-color:var(--tg);color:#fff}
.b.danger{color:var(--bad);border-color:var(--bad)}
.b.ai{border-color:var(--accent-line);color:var(--accent);background:var(--accent-soft);font-size:11.5px;padding:5px 10px;border-radius:7px}
.b:disabled{opacity:.45}
</style>
<p class="lbl">Кнопки</p>
<div class="r"><button class="b pri">Опубликовать</button><button class="b">→ В маршрут</button><button class="b danger">✕ Пропустить</button><button class="b" disabled>Недоступно</button></div>
<p class="lbl">AI-действия (всегда с ✦)</p>
<div class="r"><button class="b ai">✦ Сократить</button><button class="b ai">✦ Переписать</button><button class="b ai">✦ Перевести EN</button></div>
<p class="lbl">Telegram-контекст (синий только тут)</p>
<div class="r"><button class="b tg">+ Бот в мою группу</button></div>

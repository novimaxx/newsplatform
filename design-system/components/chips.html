<!-- @dsCard group="Компоненты" -->
<style>:root{--bg:#0B0F15;--surface:#131822;--surface2:#1A2029;--ink:#E7EBF1;--muted:#8D97A5;--line:#222937;--accent:#F0A83E;--accent-soft:#291F10;--accent-line:#4A3A1E;--good:#4CB98A;--good-soft:#132720;--warn:#E0A83E;--bad:#E06666;--bad-soft:#2C1A1A;--info:#5BAEF0;--info-soft:#132436;--sel:#1D2330;--tg:#2AABEE;--mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;--ui:"Helvetica Neue",-apple-system,"Segoe UI",Roboto,Arial,sans-serif}
*{box-sizing:border-box}body{margin:0;padding:24px;background:var(--bg);color:var(--ink);font:14px/1.5 var(--ui);-webkit-font-smoothing:antialiased}
.lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 10px}
.chip{font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;padding:2px 7px;border-radius:5px;display:inline-block;margin:0 5px 7px 0}
.tchip{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:4px 10px;border-radius:99px;border:1.4px solid var(--line);color:var(--muted);display:inline-block;margin:0 5px 7px 0}
</style>
<p class="lbl">Чипы тем · метки в карточках</p>
<div>

<span class="chip" style="color:#63C795;background:#152B22">Финансы</span>
<span class="chip" style="color:#6FBBE8;background:#15242E">Мировые</span>
<span class="chip" style="color:#B99AE0;background:#241B2E">Политика</span>
<span class="chip" style="color:#6FD0DC;background:#12282B">Технологии</span>
<span class="chip" style="color:#D8C070;background:#282210">Спорт</span>
<span class="chip" style="color:#8D97A5;background:#1A2029">Реклама · скрыто</span>
</div>
<p class="lbl" style="margin-top:14px">Чипы-фильтры (вкл = заливка темы)</p>
<div>

</div>

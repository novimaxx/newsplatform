<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WIRE — терминал новостей (прототип Claude)</title>
<style>
/* ═══════════ ТОКЕНЫ · AURORA (индиго + циан) ═══════════ */
:root{
  /* AURORA · светлая «прохладный фарфор» */
  --bg:#EEF0FB; --surface:#FFFFFF; --surface2:#F0F2FC; --ink:#151735; --muted:#5A5F80;
  --line:#E4E5F2; --accent:#5B4FE0; --accent2:#0CA5C4; --accent-soft:#ECEBFC; --accent-line:#CFCDF5;
  --good:#0E9E6E; --good-soft:#E2F3EC; --warn:#B7791F; --bad:#D64545; --bad-soft:#F7E6E6;
  --info:#0CA5C4; --info-soft:#E3F5F9; --tg:#2AABEE;
  --sel:#F1EFFC;
  --mesh1:rgba(91,79,224,.06); --mesh2:rgba(12,165,196,.05);
  --glow:0 0 24px rgba(91,79,224,.18);
  --shadow:0 1px 2px rgba(20,22,51,.05),0 8px 26px rgba(20,22,51,.08);
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --ui:"Helvetica Neue",-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
}
[data-theme="dark"]{
  /* AURORA · тёмная «сине-чёрный космос» */
  --bg:#080B14; --surface:#111524; --surface2:#191E30; --ink:#EAECF6; --muted:#8D92AD;
  --line:#232840; --accent:#8B8CF2; --accent2:#67E8F0; --accent-soft:#1B1B3A; --accent-line:#34345E;
  --good:#4ADE9E; --good-soft:#0E2A22; --warn:#F2C14E; --bad:#F87171; --bad-soft:#2C1A1A;
  --info:#67E8F0; --info-soft:#0E2A33;
  --sel:#191B33;
  --mesh1:rgba(139,140,242,.11); --mesh2:rgba(103,232,240,.10);
  --glow:0 0 26px rgba(139,140,242,.32);
  --shadow:0 1px 0 rgba(255,255,255,.04) inset,0 8px 26px rgba(0,0,0,.42);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 var(--ui);-webkit-font-smoothing:antialiased;overflow:hidden;
  background-image:radial-gradient(720px 380px at 6% -8%,var(--mesh1),transparent 60%),radial-gradient(640px 420px at 100% 0%,var(--mesh2),transparent 58%);background-repeat:no-repeat}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
input{font:inherit;color:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px;border:2px solid transparent;background-clip:content-box}
.mono{font-family:var(--mono)}
.num{font-variant-numeric:tabular-nums}

/* ═══════════ КАРКАС ═══════════ */
#app{display:grid;grid-template-rows:46px 30px 1fr;height:100vh}
/* топбар */
#topbar{display:flex;align-items:center;gap:14px;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--line)}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:.06em}
.logo .pulse{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent),var(--glow);animation:pulse 2.4s infinite}
@keyframes pulse{50%{box-shadow:0 0 0 6px transparent}}
@media (prefers-reduced-motion:reduce){.logo .pulse,.live-dot{animation:none!important}}
.logo small{font-family:var(--mono);font-size:9.5px;color:var(--muted);letter-spacing:.14em;font-weight:600}
#nav{display:flex;gap:2px;margin-left:8px}
#nav button{padding:6px 12px;border-radius:8px;font-size:13px;color:var(--muted);font-weight:600}
#nav button:hover{color:var(--ink);background:var(--surface2)}
#nav button.on{color:var(--accent);background:var(--accent-soft)}
#nav button .k{font-family:var(--mono);font-size:10px;opacity:.55;margin-left:5px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-btn{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12.5px;color:var(--muted);font-weight:600}
.tb-btn:hover{color:var(--ink);border-color:var(--muted)}
.tb-btn.tg{border-color:var(--tg);color:var(--tg)}
.kbd{font-family:var(--mono);font-size:10px;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 5px;color:var(--muted)}
/* тикер */
#ticker{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--line);overflow:hidden;white-space:nowrap;font-family:var(--mono);font-size:11px;color:var(--muted)}
#ticker .live{flex:none;display:flex;align-items:center;gap:6px;padding:0 12px;color:var(--good);font-weight:700;letter-spacing:.1em;border-right:1px solid var(--line);height:100%;background:var(--surface);position:relative;z-index:2}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--good);animation:blink 1.6s infinite}
@keyframes blink{50%{opacity:.3}}
#tickertape{display:inline-block;padding-left:12px;animation:tape 60s linear infinite}
@keyframes tape{to{transform:translateX(-50%)}}
#tickertape b{color:var(--accent)}
#tickertape .sep{margin:0 16px;opacity:.4}

/* ═══════════ ЛЕНТА: MASTER-DETAIL ═══════════ */
#view{overflow:hidden}
.feed-wrap{display:grid;grid-template-columns:minmax(430px,1fr) minmax(420px,560px);height:100%}
.stream{border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0}
.stream-head{padding:10px 14px 8px;border-bottom:1px solid var(--line);background:var(--surface)}
.seg{display:flex;gap:3px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:3px;margin-bottom:9px;width:max-content}
.seg button{padding:5px 14px;border-radius:6px;font-size:12.5px;font-weight:650;color:var(--muted)}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
.seg button .c{font-family:var(--mono);font-size:10px;opacity:.6;margin-left:5px}
.row .src-tag{color:var(--accent);font-weight:600}
.chips-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tchip{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:4px 10px;border-radius:99px;border:1.4px solid var(--line);color:var(--muted)}
.tchip:hover{border-color:var(--muted)}
.tchip.on{border-color:transparent}
.tchip .c{opacity:.65;font-weight:400;margin-left:4px}
.stream-tools{display:flex;gap:8px;margin-top:9px;align-items:center}
.search{flex:1;display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:5px 10px}
.search input{flex:1;background:none;border:none;outline:none;font-size:13px;color:var(--ink)}
.search input::placeholder{color:var(--muted)}
.mini-sw{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);white-space:nowrap;cursor:pointer;user-select:none}
.sw{width:30px;height:17px;border-radius:99px;background:var(--line);position:relative;flex:none;transition:background .15s}
.sw::after{content:"";position:absolute;width:13px;height:13px;border-radius:50%;background:var(--surface);top:2px;left:2px;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.3)}
.mini-sw.on .sw{background:var(--accent)}
.mini-sw.on .sw::after{left:15px}
#rows{flex:1;overflow-y:auto}
.row{padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;position:relative}
.row:hover{background:var(--surface2)}
.row.sel{background:var(--sel)}
.row.sel::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:linear-gradient(180deg,var(--accent),var(--accent2));box-shadow:var(--glow)}
.row.fresh{animation:fresh 2.5s ease-out}
@keyframes fresh{0%{background:var(--accent-soft)}100%{background:transparent}}
.row-top{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.chip{font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;padding:2px 7px;border-radius:5px}
.imp{margin-left:auto;display:flex;gap:2.5px;flex:none}
.imp i{width:4px;height:11px;border-radius:2px;background:var(--line)}
.imp i.on{background:var(--accent)}
.row h3{margin:0 0 2px;font-size:13.5px;font-weight:650;line-height:1.35;letter-spacing:-.005em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.row-meta{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted);font-family:var(--mono)}
.row-meta .m-merge{color:var(--info)}
.row-meta .m-media{opacity:.8}
.row-meta .m-time{margin-left:auto}
.row.is-ad{opacity:.5}
.row.is-ad h3{font-size:12px;color:var(--muted);font-weight:500;-webkit-line-clamp:1}
/* детальная панель */
.detail{overflow-y:auto;background:var(--surface)}
.detail-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:13px}
.detail-empty .kbd{font-size:11px}
.det{padding:18px 20px 28px}
.det-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.det h2{margin:0 0 10px;font-size:19px;line-height:1.3;letter-spacing:-.01em;text-wrap:balance}
.det .body{font-size:13.5px;line-height:1.65;color:var(--ink);margin:0 0 14px;white-space:pre-line}
.media-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:0 0 14px}
.media-grid.single{grid-template-columns:1fr}
.mph{aspect-ratio:16/10;border-radius:9px;position:relative;overflow:hidden;border:1px solid var(--line)}
.media-grid.single .mph{aspect-ratio:16/8}
.mph .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:50%;background:rgba(10,14,20,.7);border:1.5px solid rgba(255,255,255,.8);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;padding-left:3px}
.mph .dur{position:absolute;right:8px;bottom:7px;background:rgba(8,12,18,.8);color:#E7EBF1;font-family:var(--mono);font-size:10px;border-radius:5px;padding:2px 7px}
.mph .more{position:absolute;inset:0;background:rgba(8,12,18,.55);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.det-ctx{display:inline-flex;gap:8px;align-items:center;font-family:var(--mono);font-size:11.5px;color:var(--good);background:var(--good-soft);border-radius:8px;padding:5px 11px;margin-bottom:14px}
/* таймлайн источников */
.src-block{border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:16px}
.src-head{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--surface2);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700}
.src-head .n{color:var(--info)}
.srcline{display:flex;align-items:center;gap:10px;padding:7px 13px;border-top:1px solid var(--line);font-size:12.5px}
.srcline .ch{font-weight:600}
.srcline .u{color:var(--info);font-family:var(--mono);font-size:11px}
.srcline .first{font-family:var(--mono);font-size:9.5px;color:var(--good);border:1px solid var(--good);border-radius:99px;padding:1px 7px;letter-spacing:.06em}
.srcline .dt{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
.srcline .lag{font-family:var(--mono);font-size:10px;color:var(--muted);opacity:.7}
.src-more{padding:7px 13px;border-top:1px solid var(--line);font-size:12px;color:var(--info);cursor:pointer}
.det-actions{display:flex;gap:8px;flex-wrap:wrap}
.abtn{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600}
.abtn:hover{border-color:var(--muted)}
.abtn.pri{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#0A0B1A;box-shadow:var(--glow)}
.abtn.pri:hover{filter:brightness(1.06)}

/* ═══════════ ОБЩИЕ ЭКРАНЫ ═══════════ */
.page{height:100%;overflow-y:auto;padding:22px 26px 40px}
.page-head{display:flex;align-items:baseline;gap:14px;margin-bottom:18px;max-width:1100px}
.page-head h1{margin:0;font-size:21px;letter-spacing:-.01em}
.page-head .sub{color:var(--muted);font-size:13px}
.page-head .cta{margin-left:auto}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}

/* маршруты */
.routes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px;max-width:1100px}
.rcard{padding:16px 18px;display:flex;flex-direction:column;gap:9px}
.rcard .r-dest{display:flex;align-items:center;gap:8px;font-weight:650;font-size:14px}
.rcard .r-dest .ic{width:30px;height:30px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:14px;flex:none}
.rcard .r-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.pill{font-family:var(--mono);font-size:10px;border:1px solid var(--line);color:var(--muted);border-radius:99px;padding:2px 9px;letter-spacing:.05em}
.rcard .r-foot{display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--muted);font-family:var(--mono);border-top:1px solid var(--line);padding-top:10px;margin-top:2px}
.rcard .r-foot .stat{color:var(--good)}
.rcard.paused{opacity:.55}

/* источники */
.src-two{display:grid;grid-template-columns:1fr 360px;gap:16px;max-width:1150px;align-items:start}
@media(max-width:980px){.src-two{grid-template-columns:1fr}}
.stable{width:100%;border-collapse:collapse;font-size:13px}
.stable td{padding:9px 14px;border-top:1px solid var(--line)}
.stable tr:hover td{background:var(--surface2)}
.stable .t{font-weight:600}
.stable .u{font-family:var(--mono);font-size:11px;color:var(--info)}
.stable .ppd{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
.addbox{padding:16px 18px}
.addbox h3{margin:0 0 4px;font-size:14.5px}
.addbox p{margin:0 0 12px;font-size:12.5px;color:var(--muted)}
.addrow{display:flex;gap:8px}
.addrow input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:13px;outline:none}
.addrow input:focus{border-color:var(--accent)}
.resolve{margin-top:12px;border:1px solid var(--info);border-radius:10px;padding:13px 15px;background:var(--info-soft)}
.resolve h4{margin:0 0 4px;font-size:13.5px}
.resolve .meta{display:flex;gap:6px;flex-wrap:wrap;margin:7px 0 10px}
.mysrc{margin-top:14px}
.mysrc .srcline{border-top:1px solid var(--line)}

/* редакция */
.ed-wrap{display:grid;grid-template-columns:330px 1fr;height:100%}
.ed-queue{border-right:1px solid var(--line);overflow-y:auto}
.ed-queue-head{padding:14px 16px 10px;border-bottom:1px solid var(--line)}
.ed-queue-head h2{margin:0 0 8px;font-size:15px}
.ed-tabs{display:flex;gap:5px}
.ed-tabs button{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;border:1px solid var(--line);border-radius:99px;padding:3px 10px;color:var(--muted);font-weight:700}
.ed-tabs button.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.cand{padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer}
.cand:hover{background:var(--surface2)}
.cand.sel{background:var(--sel);box-shadow:inset 3px 0 var(--accent)}
.cand .c-top{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.cand .score{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--good)}
.cand h4{margin:0;font-size:12.5px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cand.done{opacity:.45}
.studio{overflow-y:auto;padding:20px 24px 40px;background:var(--surface)}
.studio .st-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1050px}
@media(max-width:1100px){.studio .st-grid{grid-template-columns:1fr}}
.st-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;display:block;margin-bottom:8px}
.orig{border:1px solid var(--line);border-radius:11px;padding:14px 16px;background:var(--bg)}
.orig p{margin:8px 0 0;font-size:12.5px;color:var(--muted);line-height:1.6}
.vars{display:flex;flex-direction:column;gap:7px;margin-top:14px}
.var{border:1.4px solid var(--line);border-radius:9px;padding:9px 12px;font-size:12.5px;line-height:1.5;cursor:pointer}
.var:hover{border-color:var(--muted)}
.var.pick{border-color:var(--good);background:var(--good-soft)}
.var .vl{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:2px}
.f-title{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;font-weight:650;outline:none;margin-bottom:12px}
.f-title:focus,.f-text:focus{border-color:var(--accent)}
.f-text{width:100%;min-height:130px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:13px;line-height:1.6;outline:none;resize:vertical;font-family:var(--ui)}
.ai-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.aibtn{font-size:11.5px;font-weight:600;border:1px solid var(--accent-line);color:var(--accent);background:var(--accent-soft);border-radius:7px;padding:5px 10px}
.aibtn:disabled{opacity:.5;cursor:wait}
.med-row{display:flex;gap:7px;margin-top:8px}
.med{width:76px;aspect-ratio:16/11;border-radius:8px;border:2px solid transparent;cursor:pointer;position:relative;overflow:hidden}
.med.pick{border-color:var(--good)}
.med .no{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:18px;background:var(--bg);border:1px dashed var(--line);border-radius:6px}
.dest-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.dest{border:1.4px solid var(--line);border-radius:99px;padding:6px 13px;font-size:12.5px;color:var(--muted);cursor:pointer;font-weight:600}
.dest.on{border-color:var(--tg);color:var(--tg);background:var(--info-soft)}
.pub-row{display:flex;gap:9px;margin-top:18px}

/* пульт */
.ops-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:1150px;margin-bottom:14px}
@media(max-width:1000px){.ops-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{padding:14px 16px}
.kpi .k{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700}
.kpi .v{font-size:26px;font-weight:750;letter-spacing:-.02em;margin-top:4px}
.kpi .d{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.kpi .v.money{color:var(--accent)}
.ops-two{display:grid;grid-template-columns:1.2fr 1fr;gap:12px;max-width:1150px}
@media(max-width:1000px){.ops-two{grid-template-columns:1fr}}
.svc{display:flex;align-items:center;gap:10px;padding:10px 16px;border-top:1px solid var(--line);font-size:13px}
.svc:first-of-type{border-top:none}
.dot{width:8px;height:8px;border-radius:50%;flex:none}
.dot.g{background:var(--good)}.dot.y{background:var(--warn)}.dot.r{background:var(--bad)}
.svc .nm{font-weight:600}
.svc .in{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
.acc{padding:10px 16px;border-top:1px solid var(--line)}
.acc .a-top{display:flex;align-items:center;gap:9px;font-size:13px;margin-bottom:6px}
.acc .bar{height:5px;border-radius:99px;background:var(--line);overflow:hidden}
.acc .bar i{display:block;height:100%;background:var(--accent);border-radius:99px}
.blk-head{padding:12px 16px;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--line)}
.qa{padding:14px 16px}
.qa .qtxt{font-size:12.5px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin:8px 0 10px;line-height:1.55}
.qa .qbtns{display:flex;gap:7px}

/* ═══════════ MINI APP ═══════════ */
#miniapp{position:fixed;inset:0;background:color-mix(in srgb,var(--bg) 60%,black);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:60}
#miniapp.open{display:flex}
.phone{width:365px;height:calc(100vh - 60px);max-height:730px;border-radius:42px;background:#0E1621;border:1px solid #2A3442;box-shadow:0 30px 80px rgba(0,0,0,.5);overflow:hidden;display:flex;flex-direction:column;position:relative}
.ph-status{height:28px;display:flex;justify-content:center;align-items:flex-end}
.ph-status i{width:108px;height:16px;background:#000;border-radius:0 0 13px 13px}
.tg-head{display:flex;align-items:center;gap:9px;padding:9px 14px;background:#17212B;border-bottom:1px solid #232E3C;flex:none}
.tg-ava{width:29px;height:29px;border-radius:50%;background:linear-gradient(135deg,#F0A83E,#E0703A);display:flex;align-items:center;justify-content:center;font-size:13px}
.tg-head .t{font-size:12.5px;font-weight:650;color:#EDF1F5;line-height:1.2}
.tg-head .s{font-size:10px;color:#5BC2F4}
.tg-close{margin-left:auto;color:#7D8B99;font-size:17px}
.ph-body{flex:1;overflow-y:auto;color:#EDF1F5;padding:16px}
.ph-body h4{margin:0 0 3px;font-size:16px}
.ph-body .hint{font-size:11.5px;color:#7D8B99;margin:0 0 13px}
.ph-step{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#7D8B99;margin-bottom:6px}
.ph-topics{display:flex;flex-wrap:wrap;gap:7px}
.ph-tpc{border:1.3px solid #2E3B4B;color:#B9C4CF;border-radius:99px;padding:6px 13px;font-size:12px;cursor:pointer}
.ph-tpc.on{background:#1E4266;border-color:#2AABEE;color:#BFE3FA;font-weight:600}
.ph-row{display:flex;align-items:center;justify-content:space-between;padding:11px 2px;border-bottom:1px solid #232E3C;font-size:12.5px;color:#C6CFD8;cursor:pointer}
.ph-sw{width:34px;height:20px;border-radius:99px;background:#33404F;position:relative}
.ph-sw::after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:#8B96A2;top:2px;left:2px;transition:left .15s}
.ph-sw.on{background:#2AABEE}.ph-sw.on::after{left:16px;background:#fff}
.ph-radio{border:1.4px solid #2E3B4B;border-radius:11px;padding:11px 13px;margin-bottom:8px;cursor:pointer}
.ph-radio.on{border-color:#2AABEE;background:#15334A}
.ph-radio b{display:block;font-size:12.5px;margin-bottom:2px}
.ph-radio span{font-size:11px;color:#7D8B99;line-height:1.45}
.ph-card{background:#17212B;border:1px solid #232E3C;border-radius:11px;padding:11px 12px;margin-bottom:9px}
.ph-card .pc-top{display:flex;gap:5px;align-items:center;margin-bottom:4px}
.ph-card h5{margin:0 0 3px;font-size:12.5px;line-height:1.4;color:#EDF1F5}
.ph-card .pc-meta{font-family:var(--mono);font-size:10px;color:#7D8B99;display:flex;gap:9px}
.ph-card .pc-meta .mg{color:#8FB8DC}
.tg-main{flex:none;margin:10px 14px 16px;background:#2AABEE;border-radius:11px;text-align:center;color:#fff;font-weight:650;font-size:13.5px;padding:12px;cursor:pointer}
.tg-main:active{filter:brightness(.92)}
.ph-done{text-align:center;padding:40px 10px}
.ph-done .big{font-size:44px;margin-bottom:10px}

/* ═══════════ МОДАЛКИ / ПАЛИТРА / ТОСТ ═══════════ */
.overlay{position:fixed;inset:0;background:rgba(5,8,12,.55);display:none;align-items:flex-start;justify-content:center;z-index:50;padding-top:12vh}
.overlay.open{display:flex}
.modal{width:min(520px,92vw);background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.modal-head{display:flex;align-items:center;padding:15px 20px;border-bottom:1px solid var(--line)}
.modal-head h3{margin:0;font-size:15px}
.modal-head .x{margin-left:auto;color:var(--muted);font-size:17px}
.modal-body{padding:18px 20px}
.wiz-steps{display:flex;gap:5px;margin-bottom:16px}
.wiz-steps i{height:3px;flex:1;border-radius:99px;background:var(--line)}
.wiz-steps i.on{background:var(--accent)}
.wz-topics{display:flex;flex-wrap:wrap;gap:7px}
.modal-foot{display:flex;justify-content:space-between;padding:13px 20px;border-top:1px solid var(--line)}
.mbtn{border:1px solid var(--line);border-radius:9px;padding:8px 16px;font-size:13px;font-weight:600;color:var(--muted)}
.mbtn.pri{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#0A0B1A}
.destpick{display:flex;flex-direction:column;gap:7px}
.destpick .dp{display:flex;align-items:center;gap:10px;border:1.4px solid var(--line);border-radius:10px;padding:10px 13px;cursor:pointer;font-size:13px}
.destpick .dp.on{border-color:var(--tg);background:var(--info-soft)}
.destpick .dp small{color:var(--muted);margin-left:auto;font-family:var(--mono);font-size:10.5px}
/* палитра */
#palette .modal{width:min(560px,92vw)}
#pal-in{width:100%;border:none;outline:none;background:none;font-size:15px;padding:16px 20px;border-bottom:1px solid var(--line);color:var(--ink)}
#pal-list{max-height:300px;overflow-y:auto;padding:6px}
.pal-it{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:9px;font-size:13.5px;cursor:pointer}
.pal-it:hover,.pal-it.on{background:var(--surface2)}
.pal-it .k{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted)}
/* тост */
#toasts{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:80;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--ink);color:var(--bg);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;box-shadow:var(--shadow);animation:toastIn .2s ease-out}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}}
/* адаптив */
@media(max-width:900px){.feed-wrap{grid-template-columns:1fr}.detail{display:none}.feed-wrap.showdet .stream{display:none}.feed-wrap.showdet .detail{display:block}}
</style>

function renderEditor(){
 const cands=CANDS.filter(c=>c.ed===S.edTab);
 if(!cands.find(c=>c.id===S.selCand&&c.ed===S.edTab))S.selCand=cands[0]?.id;
 const c=CANDS.find(x=>x.id===S.selCand);
 const ev=c?EVENTS.find(e=>e.id===c.ev):null;
 $('#view').innerHTML=`<div class="ed-wrap">
  <div class="ed-queue">
   <div class="ed-queue-head"><h2>Очередь кандидатов</h2>
    <div class="ed-tabs">${EDITIONS.map((e,i)=>`<button class="${i===S.edTab?'on':''}" data-e="${i}">${e}</button>`).join('')}</div></div>
   ${cands.map(cd=>{const e=EVENTS.find(x=>x.id===cd.ev);return`
    <div class="cand ${cd.id===S.selCand?'sel':''} ${cd.st!=='pending'?'done':''}" data-c="${cd.id}">
     <div class="c-top">${e.tp.map(chip).join('')}<span class="score num">AI ${Math.round(cd.score*100)}%</span></div>
     <h4>${esc(e.t)}</h4>
     ${cd.st!=='pending'?`<div style="font-family:var(--mono);font-size:9.5px;color:var(--good);margin-top:3px">✓ ОПУБЛИКОВАНО</div>`:''}
    </div>`}).join('')||'<div style="padding:20px;color:var(--muted);font-size:13px">Кандидатов нет — AI ищет</div>'}
  </div>
  <div class="studio">${c?renderStudio(c,ev):'<div class="detail-empty">Выбери кандидата</div>'}</div>
 </div>`;
 document.querySelectorAll('[data-e]').forEach(b=>b.onclick=()=>{S.edTab=+b.dataset.e;renderEditor()});
 document.querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>{S.selCand=+b.dataset.c;renderEditor()});
 if(c)bindStudio(c,ev);
}
function renderStudio(c,ev){
 const picked=S.pickVar[c.id]??0;
 const text=S.candText[c.id]??c.draft;
 const media=S.candMedia[c.id]??0;
 const dest=S.candDest[c.id]??0;
 const nMedia=ev.media?(ev.media.k==='album'?Math.min(ev.media.n,4):1):0;
 let meds='';for(let i=0;i<nMedia;i++)meds+=`<div class="med ${media===i?'pick':''}" data-m="${i}" style="background:${GR[i%4]}"></div>`;
 meds+=`<div class="med ${media===-1?'pick':''}" data-m="-1"><span class="no">∅</span></div>`;
 return`<div class="st-grid">
  <div>
   <span class="st-label">Оригинал · ⧉ ${ev.src.length} источников</span>
   <div class="orig"><b style="font-size:13.5px">${esc(ev.t)}</b><p>${esc(ev.x)}</p></div>
   <span class="st-label" style="margin-top:16px">✦ AI-варианты заголовка</span>
   <div class="vars">${c.vars.map((v,i)=>`<div class="var ${picked===i?'pick':''}" data-v="${i}"><span class="vl">${v[0]}${picked===i?' · выбран':''}</span>${esc(v[1])}</div>`).join('')}</div>
  </div>
  <div>
   <span class="st-label">Пост для «${EDITIONS[c.ed]}»</span>
   <input class="f-title" id="fT" value="${esc(c.vars[picked][1])}">
   <textarea class="f-text" id="fX">${esc(text)}</textarea>
   <div class="ai-row">
    <button class="aibtn" data-ai="short">✦ Сократить</button>
    <button class="aibtn" data-ai="rew">✦ Переписать</button>
    <button class="aibtn" data-ai="en">✦ Перевести EN</button>
   </div>
   <span class="st-label" style="margin-top:16px">Медиа</span>
   <div class="med-row">${meds}</div>
   <span class="st-label" style="margin-top:16px">Куда</span>
   <div class="dest-row">${['📢 '+EDITIONS[c.ed],'📣 VIP-группа','💬 В ЛС'].map((d,i)=>`<span class="dest ${dest===i?'on':''}" data-d="${i}">${d}</span>`).join('')}</div>
   <div class="pub-row">
    <button class="abtn pri" id="pub">Опубликовать</button>
    <button class="abtn" id="defer">⏱ В отложку</button>
    <button class="abtn" id="skip" style="color:var(--bad)">✕ Пропустить</button>
   </div>
  </div>
 </div>`}
function bindStudio(c,ev){
 document.querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{S.pickVar[c.id]=+b.dataset.v;renderEditor()});
 document.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>{S.candMedia[c.id]=+b.dataset.m;renderEditor()});
 document.querySelectorAll('[data-d]').forEach(b=>b.onclick=()=>{S.candDest[c.id]=+b.dataset.d;renderEditor()});
 $('#fX').oninput=e=>S.candText[c.id]=e.target.value;
 document.querySelectorAll('[data-ai]').forEach(b=>b.onclick=()=>{
  b.disabled=true;b.textContent='✦ Думаю…';
  setTimeout(()=>{const t=$('#fX');const mode=b.dataset.ai;
   if(mode==='short')t.value=t.value.split('\n')[0];
   if(mode==='rew')t.value='🔥 '+t.value.replace('⚡️ ','');
   if(mode==='en')t.value='[EN] '+ (S.candText[c.id]??c.draft).slice(0,120)+'…';
   S.candText[c.id]=t.value;renderEditor();toast('AI обновил текст — можно откатить правкой')},900)});
 $('#pub').onclick=()=>{c.st='published';toast(`Опубликовано в «${EDITIONS[c.ed]}» ✓`);renderEditor()};
 $('#defer').onclick=()=>{c.st='published';toast('В отложке на 09:00');renderEditor()};
 $('#skip').onclick=()=>{c.st='skipped';toast('Пропущено — AI запомнит');renderEditor()};
}

/* ═══════════ MINI APP ═══════════ */
function renderMini(){
 const scr=S.phScreen;
 let body='',main='',sub='mini app · онбординг';
 if(scr==='onb1'){
  body=`<div class="ph-step">Шаг 1 из 3 · Темы</div><h4>Что интересует?</h4><p class="hint">Лента соберётся из 1 000+ проверенных источников</p>
   <div class="ph-topics">${Object.keys(TOPICS).map(k=>`<span class="ph-tpc ${S.phTopics.has(k)?'on':''}" data-pt="${k}">${TOPICS[k][0]}</span>`).join('')}</div>`;
  main='Дальше →'}
 if(scr==='onb2'){
  body=`<div class="ph-step">Шаг 2 из 3 · Фильтры</div><h4>Чистим поток</h4><p class="hint">Всё можно поменять потом</p>
   ${[['ads','Скрывать рекламу и спам'],['dup','Склеивать дубли'],['imp','Только важное (4–5)']].map(s=>`
   <div class="ph-row" data-ps="${s[0]}">${s[1]}<span class="ph-sw ${S.phSw[s[0]]?'on':''}"></span></div>`).join('')}`;
  main='Дальше →'}
 if(scr==='onb3'){
  body=`<div class="ph-step">Шаг 3 из 3 · Формат</div><h4>Как присылать?</h4><p class="hint">Для каждого маршрута — свой</p>
   ${[['orig','Оригинал','пересылка как есть, максимально быстро'],['card','Карточка','заголовок + метки + ⧉ источники'],['dig','Дайджест','сводка утром и вечером']].map(f=>`
   <div class="ph-radio ${S.phFmt===f[0]?'on':''}" data-pf="${f[0]}"><b>${f[1]}</b><span>${f[2]}</span></div>`).join('')}`;
  main='Создать ленту'}
 if(scr==='done'){
  body=`<div class="ph-done"><div class="big">⚡️</div><h4>Готово!</h4><p class="hint">Первые новости уже едут в твою группу.<br>Настройки — в этом же приложении.</p></div>`;
  main='Открыть ленту';sub='mini app'}
 if(scr==='feed'){
  sub='mini app · лента';
  const list=feedList().slice(0,7);
  body=list.map(e=>`<div class="ph-card"><div class="pc-top">${e.tp.map(chip).join('')}</div><h5>${esc(e.t)}</h5>
   <div class="pc-meta num">${e.src.length>1?`<span class="mg">⧉ ${e.src.length}</span>`:''}<span>${ago(e.at)}</span></div></div>`).join('');

 $('#miniapp').innerHTML=`<div class="phone">

 </div>`;
 $('#phX').onclick=()=>$('#miniapp').classList.remove('open');

 document.querySelectorAll('[data-ps]').forEach(b=>b.onclick=()=>{const k=b.dataset.ps;S.phSw[k]=!S.phSw[k];renderMini()});

/* ═══════════ ПАЛИТРА ⌘K ═══════════ */
const PAL=[
 ['Лента',()=>go('feed'),'1'],['Маршруты',()=>go('routes'),'2'],['Источники',()=>go('sources'),'3'],
 ['Редакция',()=>go('editor'),'4'],['Пульт оператора',()=>go('ops'),'5'],
 ['Открыть Mini App',()=>{$('#miniapp').classList.add('open');renderMini()},'M'],
 ['Переключить тему',toggleTheme,'T'],
 ['Новый маршрут',()=>{go('routes');openWizard()},'N']];
function drawPal(){
 const q=S.palQ.toLowerCase();
 const list=PAL.filter(p=>p[0].toLowerCase().includes(q));
 if(S.palSel>=list.length)S.palSel=0;
 $('#pal-list').innerHTML=list.map((p,i)=>`<div class="pal-it ${i===S.palSel?'on':''}" data-p="${PAL.indexOf(p)}">→ ${p[0]}<span class="k">${p[2]}</span></div>`).join('')||'<div class="pal-it">Ничего…</div>';
 document.querySelectorAll('[data-p]').forEach(el=>el.onclick=()=>{$('#palette').classList.remove('open');PAL[+el.dataset.p][1]()});
}
$('#pal-in').addEventListener('input',e=>{S.palQ=e.target.value;S.palSel=0;drawPal()});
$('#pal-in').addEventListener('keydown',e=>{
 const list=PAL.filter(p=>p[0].toLowerCase().includes(S.palQ.toLowerCase()));
 if(e.key==='ArrowDown'){S.palSel=(S.palSel+1)%list.length;drawPal()}
 if(e.key==='ArrowUp'){S.palSel=(S.palSel-1+list.length)%list.length;drawPal()}
 if(e.key==='Enter'&&list[S.palSel]){$('#palette').classList.remove('open');list[S.palSel][1]()}});

/* ═══════════ РОУТИНГ / ГЛОБАЛ ═══════════ */
function go(v){S.view=v;document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
 ({feed:renderFeed,routes:renderRoutes,sources:renderSources,editor:renderEditor,ops:renderOps})[v]()}
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.v));
function toggleTheme(){const h=document.documentElement;h.dataset.theme=h.dataset.theme==='dark'?'light':'dark';localStorage.setItem('wire-theme',h.dataset.theme);go(S.view)}
$('#themebtn').onclick=toggleTheme;
if(localStorage.getItem('wire-theme'))document.documentElement.dataset.theme=localStorage.getItem('wire-theme');
$('#tgbtn').onclick=()=>{$('#miniapp').classList.add('open');renderMini()};
$('#palbtn').onclick=()=>{$('#palette').classList.add('open');S.palQ='';$('#pal-in').value='';S.palSel=0;drawPal();setTimeout(()=>$('#pal-in').focus(),30)};
document.addEventListener('keydown',e=>{
 if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();$('#palbtn').click();return}
 if(e.key==='Escape'){document.querySelectorAll('.overlay,#miniapp').forEach(o=>o.classList.remove('open'));return}
 if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
 if(['1','2','3','4','5'].includes(e.key))go(['feed','routes','sources','editor','ops'][+e.key-1]);
 if(S.view==='feed'&&(e.key==='j'||e.key==='k')){
  const list=feedList();const i=list.findIndex(x=>x.id===S.selEv);
  const ni=e.key==='j'?Math.min(i+1,list.length-1):Math.max(i-1,0);
  S.selEv=list[ni].id;renderRowsOnly();$('#detail').innerHTML=renderDetail();bindDetail();
  document.querySelector('.row.sel')?.scrollIntoView({block:'nearest'})}
});
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')}));

/* тикер */
function tickerHTML(){const items=['⧉ склейка: 14 источников → 1 карточка','первым сообщил @binance_announcements · 43 сек','AI-редактор: 4 кандидата ждут approve','отсеяно рекламы сегодня: 3 102','точность разметки: 93.4%','1 024 источника · 4 аккаунта · всё живо'];
 const s=items.map(i=>`<b>◆</b> ${i}`).join('<span class="sep"></span>');return s+'<span class="sep"></span>'+s}
$('#tickertape').innerHTML=tickerHTML();

/* live-вброс */
let poolI=0;
setInterval(()=>{
 const p=POOL[poolI%POOL.length];poolI++;
 if(EVENTS.slice(0,40).some(x=>x.t===p.t))return; // не повторять уже вброшенное
 const e={...p,id:EID++,at:Date.now(),fresh:true};
 e.src=p.src.map(s=>({...s,t:Date.now()-((s.t?(now-s.t)/1000:60)%600)*100}));
 EVENTS.unshift(e);
 S.ops.posts+=Math.floor(Math.random()*25+8);S.ops.merged+=1;S.ops.cost+=.004;
 if(S.view==='feed'){renderFeed()}
 if(S.view==='ops'){['k1','k2','k3'].forEach((k,i)=>{const el=$('#'+k);if(el)el.textContent=[S.ops.posts,S.ops.ads,S.ops.merged][i].toLocaleString('ru')});const k4=$('#k4');if(k4)k4.textContent='$'+S.ops.cost.toFixed(2)}
},11000);
setInterval(()=>{if(S.view==='feed'){document.querySelectorAll('.m-time').forEach(()=>{});renderRowsOnly();$('#detail').innerHTML=renderDetail();bindDetail()}},30000);

go('feed');
</script>

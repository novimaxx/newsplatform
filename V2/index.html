<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WIRE Terminal V2 — события и общий поток</title>
<style>
/* ═══════════ ТОКЕНЫ ═══════════ */
:root{
  --bg:#EEF0FB; --surface:#FFFFFF; --surface2:#F0F2FC; --ink:#151735; --muted:#5A5F80; --faint:#9498B8;
  --line:#E4E5F2; --hair:rgba(20,22,51,.06);
  --accent:#5B4FE0; --accent2:#0CA5C4; --accent-soft:#ECEBFC; --accent-line:#CFCDF5; --accent-ink:#FFFFFF;
  --good:#0E9E6E; --good-soft:#E2F3EC; --warn:#B7791F; --bad:#D64545; --bad-soft:#F7E6E6;
  --info:#0CA5C4; --info-soft:#E3F5F9; --tg:#2AABEE; --sel:#F1EFFC;
  --mesh1:rgba(91,79,224,.06); --mesh2:rgba(12,165,196,.05); --glow:0 0 24px rgba(91,79,224,.18);
  --shadow:0 1px 2px rgba(20,22,51,.05),0 8px 26px rgba(20,22,51,.08);
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --ui:"Helvetica Neue",-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
}
[data-theme="dark"]{
  --bg:#080B14; --surface:#111524; --surface2:#191E30; --ink:#EAECF6; --muted:#8D92AD; --faint:#5A5F7C;
  --line:#232840; --hair:rgba(234,236,246,.06);
  --accent:#8B8CF2; --accent2:#67E8F0; --accent-soft:#1B1B3A; --accent-line:#34345E; --accent-ink:#0A0B1A;
  --good:#4ADE9E; --good-soft:#0E2A22; --warn:#F2C14E; --bad:#F87171; --bad-soft:#2C1A1A;
  --info:#67E8F0; --info-soft:#0E2A33; --tg:#2AABEE; --sel:#191B33;
  --mesh1:rgba(139,140,242,.11); --mesh2:rgba(103,232,240,.10); --glow:0 0 26px rgba(139,140,242,.32);
  --shadow:0 1px 0 rgba(255,255,255,.04) inset,0 8px 26px rgba(0,0,0,.42);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background-color:var(--bg);background-image:radial-gradient(720px 380px at 6% -8%,var(--mesh1),transparent 60%),radial-gradient(640px 420px at 100% 0%,var(--mesh2),transparent 58%);background-repeat:no-repeat;color:var(--ink);font:14px/1.5 var(--ui);-webkit-font-smoothing:antialiased;overflow:hidden}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
input{font:inherit;color:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px;border:2px solid transparent;background-clip:content-box}
.mono{font-family:var(--mono)}
.num{font-variant-numeric:tabular-nums}

/* ═══════════ КАРКАС ═══════════ */
#app{display:grid;grid-template-rows:46px 30px 1fr;height:100vh}
body.ready-mode #app{grid-template-rows:46px minmax(0,1fr)}
body.ready-mode #ticker{display:none}
body.ready-mode .stream-head{display:flex;align-items:center;gap:10px;padding:7px 12px}
body.ready-mode .mode-line{margin:0;flex:none}body.ready-mode .mode-hint,body.ready-mode .chips-row{display:none}
body.ready-mode .stream-tools{flex:1;margin:0}body.ready-mode .stream-tools .mini-sw{display:none}
/* топбар */
#topbar{display:flex;align-items:center;gap:14px;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--line)}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:.06em}
.logo .pulse{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent),var(--glow);animation:pulse 2.4s infinite}
@keyframes pulse{50%{box-shadow:0 0 0 6px transparent}}
@media (prefers-reduced-motion:reduce){.logo .pulse,.live-dot{animation:none!important}}
.logo small{font-family:var(--mono);font-size:9.5px;color:var(--muted);letter-spacing:.14em;font-weight:600}
#nav{display:flex;gap:2px;margin-left:8px}
#nav button{padding:6px 12px;border-radius:8px;font-size:13px;color:var(--muted);font-weight:600}
#nav button:hover{color:var(--ink);background:var(--surface2)}
#nav button.on{color:var(--accent);background:var(--accent-soft)}
#nav button .k{font-family:var(--mono);font-size:10px;opacity:.55;margin-left:5px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.tb-btn{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:8px;padding:5px 11px;font-size:12.5px;color:var(--muted);font-weight:600}
.tb-btn:hover{color:var(--ink);border-color:var(--muted)}
.tb-btn.tg{border-color:var(--tg);color:var(--tg)}
.kbd{font-family:var(--mono);font-size:10px;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 5px;color:var(--muted)}
/* тикер */
#ticker{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--line);overflow:hidden;white-space:nowrap;font-family:var(--mono);font-size:11px;color:var(--muted)}
#ticker .live{flex:none;display:flex;align-items:center;gap:6px;padding:0 12px;color:var(--good);font-weight:700;letter-spacing:.1em;border-right:1px solid var(--line);height:100%;background:var(--surface);position:relative;z-index:2}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--good);animation:blink 1.6s infinite}
@keyframes blink{50%{opacity:.3}}
#tickertape{display:inline-block;padding-left:12px;animation:tape 60s linear infinite}
@keyframes tape{to{transform:translateX(-50%)}}
#tickertape b{color:var(--accent)}
#tickertape .sep{margin:0 16px;opacity:.4}

/* ═══════════ ЛЕНТА: MASTER-DETAIL ═══════════ */
#view{overflow:hidden}
.feed-wrap{display:grid;grid-template-columns:minmax(430px,1fr) minmax(420px,560px);height:100%;min-height:0}
.feed-wrap.raw-mode{grid-template-columns:minmax(620px,1.45fr) minmax(360px,.75fr)}
.feed-wrap.tg-channel-mode{grid-template-columns:1fr;background:#0e1621}
.feed-wrap.tg-channel-mode .stream{border-right:0}.feed-wrap.tg-channel-mode .detail{display:none}
.stream{border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0;min-height:0}
.stream-head{padding:10px 14px 8px;border-bottom:1px solid var(--line);background:var(--surface)}
.seg{display:flex;gap:3px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:3px;margin-bottom:9px;width:max-content}
.seg button{padding:5px 14px;border-radius:6px;font-size:12.5px;font-weight:650;color:var(--muted)}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
.seg button .c{font-family:var(--mono);font-size:10px;opacity:.6;margin-left:5px}
.mode-line{display:flex;align-items:center;gap:10px;margin-bottom:9px;flex-wrap:wrap}
.mode-line .seg{margin-bottom:0}
.mode-hint{font-family:var(--mono);font-size:10.5px;color:var(--muted)}
.mode-hint b{color:var(--accent);font-weight:650}
.shadow-status{display:inline-flex;align-items:center;gap:5px;margin-left:8px;padding:2px 7px;border:1px solid var(--line);border-radius:99px;color:var(--muted)}
.shadow-status i{width:5px;height:5px;border-radius:50%;background:var(--muted)}
.shadow-status.on{color:var(--good);border-color:color-mix(in srgb,var(--good) 35%,var(--line));background:var(--good-soft)}
.shadow-status.on i{background:var(--good)}
.live-tag{font-family:var(--mono);font-size:8px;letter-spacing:.09em;color:var(--good);border:1px solid var(--good);border-radius:4px;padding:1px 5px;font-weight:800}
.row .src-tag{color:var(--accent);font-weight:600}
.src-kind{font-family:var(--mono);font-size:8.5px;font-weight:800;letter-spacing:.08em;border:1px solid var(--line);border-radius:4px;padding:1px 5px}
.src-kind.tg{color:var(--tg);border-color:color-mix(in srgb,var(--tg) 45%,var(--line));background:var(--info-soft)}
.src-kind.rss{color:var(--good);border-color:color-mix(in srgb,var(--good) 45%,var(--line));background:var(--good-soft)}
.cluster-badge{font-family:var(--mono);font-size:9px;color:var(--info);margin-left:auto;border:1px solid color-mix(in srgb,var(--info) 35%,var(--line));border-radius:99px;padding:1px 7px}
.raw-origin{border:1px solid var(--accent-line);background:var(--accent-soft);border-radius:11px;padding:12px 14px;margin-bottom:14px}
.raw-origin .kicker{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--accent);font-weight:800;text-transform:uppercase;margin-bottom:7px}
.raw-origin .source{display:flex;align-items:center;gap:8px;font-weight:700}
.raw-origin .source .when{margin-left:auto;color:var(--muted);font-family:var(--mono);font-size:10px}
.raw-origin p{margin:7px 0 0;color:var(--muted);font-size:12px}
.chips-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tchip{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:4px 10px;border-radius:99px;border:1.4px solid var(--line);color:var(--muted)}
.tchip:hover{border-color:var(--muted)}
.tchip.on{border-color:transparent}
.tchip .c{opacity:.65;font-weight:400;margin-left:4px}
.stream-tools{display:flex;gap:8px;margin-top:9px;align-items:center}
.search{flex:1;display:flex;align-items:center;gap:7px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:5px 10px}
.search input{flex:1;background:none;border:none;outline:none;font-size:13px;color:var(--ink)}
.search input::placeholder{color:var(--muted)}
.mini-sw{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);white-space:nowrap;cursor:pointer;user-select:none}
.sw{width:30px;height:17px;border-radius:99px;background:var(--line);position:relative;flex:none;transition:background .15s}
.sw::after{content:"";position:absolute;width:13px;height:13px;border-radius:50%;background:var(--surface);top:2px;left:2px;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.3)}
.mini-sw.on .sw{background:var(--accent)}
.mini-sw.on .sw::after{left:15px}
#rows{flex:1;overflow-y:auto}
.row{padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer;position:relative}
.row:hover{background:var(--surface2)}
.row.sel{background:var(--sel)}
.row.sel::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:linear-gradient(180deg,var(--accent),var(--accent2));box-shadow:var(--glow)}
.row.fresh{animation:fresh 2.5s ease-out}
@keyframes fresh{0%{background:var(--accent-soft)}100%{background:transparent}}
.row-top{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.chip{font-family:var(--mono);font-size:9px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;padding:2px 7px;border-radius:5px}
.imp{margin-left:auto;display:flex;gap:2.5px;flex:none}
.imp i{width:4px;height:11px;border-radius:2px;background:var(--line)}
.imp i.on{background:var(--accent)}
.row h3{margin:0 0 2px;font-size:13.5px;font-weight:650;line-height:1.35;letter-spacing:-.005em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.row-meta{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted);font-family:var(--mono)}
.row-meta .m-merge{color:var(--info)}
.row-meta .m-media{opacity:.8}
.row-meta .m-time{margin-left:auto}
.row.is-ad{opacity:.5}
.row.is-ad h3{font-size:12px;color:var(--muted);font-weight:500;-webkit-line-clamp:1}
.tg-flow{min-height:100%;padding:22px max(14px,calc((100% - 860px)/2)) 48px;background:linear-gradient(180deg,#0d151f 0,#101b27 220px,#0d1620 100%)}
.tg-queuebar{max-width:820px;margin:0 auto 10px;display:flex;align-items:center;gap:7px;color:#8da2b2;font-size:11px}.tg-queuebar strong{color:#dce6ed}.tg-queuebar .qfilters{margin-left:auto;display:flex;gap:4px}.tg-queuebar button{padding:5px 9px;border:1px solid #293d4e;border-radius:7px;color:#8da2b2;font-size:11px}.tg-queuebar button.on{background:#203344;color:#fff;border-color:#3c5a72}
.tg-post{max-width:820px;margin:0 auto 18px;border:1px solid #293b4d;border-radius:16px;background:#172330;color:#edf4f8;box-shadow:0 12px 32px rgba(0,0,0,.22);overflow:hidden}
.tg-post.sent{opacity:.68}.tg-post.sent .tg-ready-status{color:#76b7e2;border-color:#31536a;background:#152633}.tg-post.sent .tg-ready-status i{background:#76b7e2}
.tg-post-head{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid #263746;background:#192735}.tg-avatar{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(145deg,#2f5269,#263b4e);color:#7ed0ff;font-weight:800;flex:none}
.tg-source{font-weight:750}.tg-source small{display:block;color:#87a0b2;font-family:var(--mono);font-size:9px;font-weight:500;margin-top:2px}.tg-post-time{color:#7890a2;font-family:var(--mono);font-size:10px}
.tg-ready-status{margin-left:auto;display:flex;align-items:center;gap:5px;color:#65c99a;font-family:var(--mono);font-size:9px;border:1px solid #2f594b;background:#142a24;border-radius:99px;padding:3px 8px}.tg-ready-status i{width:5px;height:5px;border-radius:50%;background:#65c99a}
.tg-head-actions{display:flex;gap:5px}.tg-head-actions button{width:30px;height:30px;border:1px solid #30475b;border-radius:8px;color:#a9bdcb;font-size:13px}.tg-head-actions button:hover{border-color:#5e7b91;color:#fff}
.tg-post-content{padding:17px 18px 4px}.tg-post-title{margin:0 0 12px;font-size:18px;line-height:1.35;letter-spacing:-.01em;color:#fff}.tg-post-body{white-space:pre-line;font-size:14px;line-height:1.62;color:#d7e0e7;overflow-wrap:anywhere;max-width:72ch}.tg-post .media-grid{margin:15px 0 6px}.tg-post-foot{display:flex;align-items:center;gap:8px;padding:5px 18px 11px;color:#7890a2;font-size:11px}
.tg-post-actions{display:flex;gap:8px;padding:11px 16px;border-top:1px solid #26394a;background:#15212c}.tg-post-actions button,.tg-post-actions a{display:flex;align-items:center;justify-content:center;border:1px solid #30475b;border-radius:9px;padding:8px 12px;color:#b9c8d3;text-decoration:none;font-size:12px;font-weight:650}.tg-post-actions .send{background:#f0a83e;border-color:#f0a83e;color:#171109}.tg-post-actions a{margin-left:auto}
.quick-edit{width:min(820px,94vw)}.quick-edit .field{display:block;margin-bottom:13px}.quick-edit .field>span{display:block;margin-bottom:5px;color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}.quick-edit input,.quick-edit textarea{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;color:var(--ink);font:14px/1.55 var(--ui);padding:10px 12px;outline:none}.quick-edit textarea{min-height:clamp(300px,40dvh,480px);resize:vertical}.quick-edit input:focus,.quick-edit textarea:focus{border-color:var(--accent)}.quick-media{border:1px solid var(--line);border-radius:11px;padding:10px;background:var(--bg)}.quick-media .media-grid{max-height:180px;overflow:hidden;margin:0 0 8px}.quick-media-foot{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:11px}.pause-note{padding:11px 13px;border:1px solid var(--accent-line);border-radius:10px;background:var(--accent-soft);color:var(--ink);font-size:12px;margin-bottom:13px}.pause-note b{color:var(--accent)}
.quick-edit{height:min(900px,calc(100dvh - 32px));max-height:calc(100dvh - 32px);display:grid;grid-template-rows:auto minmax(0,1fr) auto}.quick-edit .modal-head,.quick-edit .modal-foot{flex:none;background:var(--surface);position:relative;z-index:2}.quick-edit .modal-body{min-height:0;overflow-y:auto;overscroll-behavior:contain}.quick-edit textarea{min-height:clamp(300px,40dvh,480px);max-height:none}.quick-edit .quick-media .media-grid{height:min(170px,18dvh);max-height:18dvh}.quick-edit .quick-media .mph{height:100%;aspect-ratio:auto}.quick-edit .quick-media img,.quick-edit .quick-media video{object-fit:cover}
#quickModal.overlay{align-items:center;padding:16px 12px;padding-top:16px}
/* детальная панель */
.detail{overflow-y:auto;background:var(--surface);min-height:0;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.detail-empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:13px}
.detail-empty .kbd{font-size:11px}
.det{padding:18px 20px 28px}
.mobile-back{display:none}
.det-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.det h2{margin:0 0 10px;font-size:19px;line-height:1.3;letter-spacing:-.01em;text-wrap:balance}
.det .body{font-size:13.5px;line-height:1.65;color:var(--ink);margin:0 0 14px;white-space:pre-line}
.media-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:0 0 14px}
.media-grid.single{grid-template-columns:1fr}
.media-grid.telegram-album{grid-template-columns:repeat(2,minmax(0,1fr));grid-auto-rows:minmax(150px,28vh)}
.media-grid.telegram-album.one{grid-template-columns:1fr;grid-auto-rows:minmax(220px,42vh)}
.media-grid.telegram-album.three .mph:first-child{grid-row:span 2}
.media-grid.telegram-album .mph{aspect-ratio:auto;min-height:0}
.mph{aspect-ratio:16/10;border-radius:9px;position:relative;overflow:hidden;border:1px solid var(--line)}
.mph img,.mph video{display:block;width:100%;height:100%;object-fit:cover;background:#090d13}
.lazy-video{width:100%;min-height:100%;background:#090d13;touch-action:pan-y}
.lazy-video .play{pointer-events:none}
.photo-open{display:block;width:100%;height:100%;background:#090d13;cursor:zoom-in}
.photo-lightbox{position:fixed;inset:0;z-index:2500;display:flex;align-items:center;justify-content:center;padding:24px 72px;background:rgba(3,7,12,.92);backdrop-filter:blur(12px)}.photo-lightbox img{display:block;max-width:min(1200px,92vw);max-height:88vh;object-fit:contain;border-radius:10px;box-shadow:0 22px 80px rgba(0,0,0,.55)}.photo-lightbox .x{position:absolute;right:18px;top:16px;width:42px;height:42px;border-radius:50%;background:#1a2531;border:1px solid #34485c;color:#fff;font-size:19px}.photo-lightbox .gal-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:58px;border-radius:12px;background:#172431;border:1px solid #3b5268;color:#fff;font-size:24px}.photo-lightbox .prev{left:18px}.photo-lightbox .next{right:18px}.photo-lightbox .gal-count{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);padding:5px 12px;border-radius:99px;background:#172431;border:1px solid #34485c;color:#fff;font-family:var(--mono);font-size:11px}
.media-grid.single .mph{aspect-ratio:16/8}
.mph .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:50%;background:rgba(10,14,20,.7);border:1.5px solid rgba(255,255,255,.8);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;padding-left:3px}
.mph .dur{position:absolute;right:8px;bottom:7px;background:rgba(8,12,18,.8);color:#E7EBF1;font-family:var(--mono);font-size:10px;border-radius:5px;padding:2px 7px}
.mph .more{position:absolute;inset:0;background:rgba(8,12,18,.55);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.det-ctx{display:inline-flex;gap:8px;align-items:center;font-family:var(--mono);font-size:11.5px;color:var(--good);background:var(--good-soft);border-radius:8px;padding:5px 11px;margin-bottom:14px}
/* таймлайн источников */
.src-block{border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:16px}
.src-head{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--surface2);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700}
.src-head .n{color:var(--info)}
.srcline{display:flex;align-items:center;gap:10px;padding:7px 13px;border-top:1px solid var(--line);font-size:12.5px}
.srcline .ch{font-weight:600}
.srcline .u{color:var(--info);font-family:var(--mono);font-size:11px}
.srcline .first{font-family:var(--mono);font-size:9.5px;color:var(--good);border:1px solid var(--good);border-radius:99px;padding:1px 7px;letter-spacing:.06em}
.srcline .dt{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
.srcline .lag{font-family:var(--mono);font-size:10px;color:var(--muted);opacity:.7}
.src-more{padding:7px 13px;border-top:1px solid var(--line);font-size:12px;color:var(--info);cursor:pointer}
.det-actions{display:flex;gap:8px;flex-wrap:wrap}
.abtn{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;color:inherit;text-decoration:none}

  if(changed&&S.view==='feed'&&!editing&&!modalOpen){renderRowsOnly();const evc=$('#evCount'),rawc=$('#rawCount'),tgc=$('#tgCount');if(evc)evc.textContent=`${feedList().length} событий`;if(rawc)rawc.textContent=`${rawList().length} публикаций`;if(tgc)tgc.textContent=`${rawList().length} постов`;const badge=document.querySelector('.shadow-status');if(badge){badge.classList.add('on');badge.innerHTML=`<i></i>SHADOW · ${SHADOW_STATE.total}`}}
 }catch(e){SHADOW_STATE.online=false}
}
